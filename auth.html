<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #00ffe0;
    --neon2: #ff00aa;
    --bg: #020812;
    --card: rgba(0,255,224,0.04);
    --border: rgba(0,255,224,0.15);
    --text: #c8fff8;
    --muted: rgba(200,255,248,0.4);
    --error: #ff4d6d;
    --success: #00ffe0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,224,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,224,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }
  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    animation: orbFloat 8s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,255,224,0.07); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: rgba(255,0,170,0.07); bottom: -80px; right: -80px; animation-delay: -3s; }
  .orb3 { width: 200px; height: 200px; background: rgba(0,100,255,0.06); top: 50%; left: 50%; animation-delay: -6s; }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  /* Scanlines */
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none; z-index: 999;
    animation: scanMove 10s linear infinite;
  }
  @keyframes scanMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  /* Particles */
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--neon);
    border-radius: 50%;
    animation: particleFly linear infinite;
    opacity: 0;
  }
  @keyframes particleFly {
    0% { opacity: 0; transform: translateY(100vh) translateX(0); }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-100px) translateX(var(--drift)); }
  }

  /* Main card */
  .card {
    position: relative; z-index: 10;
    width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 48px 40px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(0,255,224,0.05),
      0 0 60px rgba(0,255,224,0.05),
      inset 0 1px 0 rgba(0,255,224,0.1);
    animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardAppear {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner decorations */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--neon);
    border-style: solid;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .card::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* Logo */
  .logo {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeSlide 0.6s 0.2s both;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--neon);
    text-shadow: 0 0 20px rgba(0,255,224,0.5), 0 0 40px rgba(0,255,224,0.2);
    animation: glitch 4s infinite;
  }
  @keyframes glitch {
    0%, 95%, 100% { text-shadow: 0 0 20px rgba(0,255,224,0.5), 0 0 40px rgba(0,255,224,0.2); transform: none; }
    96% { text-shadow: -2px 0 var(--neon2), 2px 0 var(--neon); transform: translateX(2px); }
    97% { text-shadow: 2px 0 var(--neon2), -2px 0 var(--neon); transform: translateX(-2px); }
    98% { text-shadow: 0 0 20px rgba(0,255,224,0.5); transform: none; }
  }
  .logo-sub {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Tab switcher */
  .tabs {
    display: flex;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    animation: fadeSlide 0.6s 0.3s both;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .tab-btn.active {
    color: var(--neon);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon);
    animation: tabLine 0.3s ease;
  }
  @keyframes tabLine {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  /* Steps indicator */
  .steps {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    gap: 0;
    animation: fadeSlide 0.6s 0.35s both;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--muted);
    transition: all 0.4s;
    position: relative;
  }
  .step-dot.active {
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 0 12px rgba(0,255,224,0.3);
  }
  .step-dot.done {
    background: rgba(0,255,224,0.15);
    border-color: var(--neon);
    color: var(--neon);
  }
  .step-line {
    flex: 1; height: 1px;
    background: var(--border);
    max-width: 50px;
    transition: background 0.4s;
  }
  .step-line.active { background: var(--neon); box-shadow: 0 0 6px var(--neon); }

  /* Form */
  .form-group {
    margin-bottom: 20px;
    animation: fadeSlide 0.5s both;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    transition: color 0.3s;
  }

  input[type="tel"], input[type="password"], input[type="text"] {
    width: 100%;
    background: rgba(0,255,224,0.03);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    padding: 13px 14px 13px 42px;
    outline: none;
    border-radius: 2px;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  input:focus {
    border-color: var(--neon);
    background: rgba(0,255,224,0.06);
    box-shadow: 0 0 20px rgba(0,255,224,0.08), inset 0 0 10px rgba(0,255,224,0.03);
  }
  input:focus + .input-glow { opacity: 1; }
  .input-glow {
    position: absolute; inset: -1px;
    border-radius: 2px;
    background: transparent;
    pointer-events: none;
    box-shadow: 0 0 15px rgba(0,255,224,0.15);
    opacity: 0;
    transition: opacity 0.3s;
  }
  input::placeholder { color: rgba(200,255,248,0.2); }
  input[type="tel"] { letter-spacing: 2px; }

  /* OTP inputs */
  .otp-group {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .otp-input {
    width: 52px !important;
    height: 56px;
    text-align: center;
    font-family: 'Orbitron', monospace !important;
    font-size: 20px !important;
    padding: 0 !important;
    letter-spacing: 0 !important;
  }

  /* Password strength */
  .strength-bar {
    margin-top: 8px;
    display: flex;
    gap: 4px;
  }
  .strength-seg {
    flex: 1; height: 3px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .strength-seg.weak { background: var(--error); }
  .strength-seg.medium { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }
  .strength-seg.strong { background: var(--neon); box-shadow: 0 0 6px var(--neon); }
  .strength-label {
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 4px;
    color: var(--muted);
    transition: color 0.3s;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1px solid var(--neon);
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    cursor: pointer;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    margin-top: 8px;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--neon);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: 0;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: var(--bg); box-shadow: 0 0 30px rgba(0,255,224,0.3); }
  .btn span { position: relative; z-index: 1; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled::before { display: none; }

  .btn-ghost {
    background: rgba(0,255,224,0.05);
    border-color: rgba(0,255,224,0.3);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px;
    margin-top: 4px;
  }
  .btn-ghost:hover { color: var(--bg); }

  /* Timer */
  .timer {
    text-align: center;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 12px;
  }
  .timer span { color: var(--neon); font-family: 'Orbitron', monospace; }
  .resend-link {
    color: var(--neon);
    cursor: pointer;
    text-decoration: underline;
    display: none;
  }

  /* Alert */
  .alert {
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 13px;
    letter-spacing: 1px;
    margin-bottom: 16px;
    display: none;
    animation: alertPop 0.3s ease;
  }
  @keyframes alertPop {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .alert.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.4); color: var(--error); }
  .alert.success { background: rgba(0,255,224,0.07); border: 1px solid rgba(0,255,224,0.3); color: var(--neon); }

  /* Loading spinner inside button */
  .btn-loader {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn.loading .btn-text { display: none; }
  .btn.loading .btn-loader { display: block; }

  /* Phase transitions */
  .phase {
    display: none;
    animation: phaseIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .phase.active { display: block; }
  @keyframes phaseIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Success screen */
  .success-screen {
    text-align: center;
    padding: 20px 0;
  }
  .success-icon {
    width: 80px; height: 80px;
    margin: 0 auto 24px;
    position: relative;
  }
  .success-ring {
    width: 80px; height: 80px;
    border: 2px solid var(--neon);
    border-radius: 50%;
    position: absolute;
    animation: ringPulse 2s ease infinite;
    box-shadow: 0 0 20px rgba(0,255,224,0.3);
  }
  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }
  .success-check {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    color: var(--neon);
    text-shadow: 0 0 20px var(--neon);
  }
  .success-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--neon);
    margin-bottom: 8px;
  }
  .success-sub {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* Phone prefix */
  .phone-prefix {
    position: absolute;
    left: 42px; top: 50%;
    transform: translateY(-50%);
    color: var(--neon);
    font-size: 16px;
    letter-spacing: 1px;
    pointer-events: none;
  }
  input[name="phone"] { padding-left: 82px !important; }

  /* Show password toggle */
  .toggle-pass {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    transition: color 0.2s;
    user-select: none;
  }
  .toggle-pass:hover { color: var(--neon); }

  /* Note */
  .note {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 20px;
  }
  .note a {
    color: var(--neon);
    cursor: pointer;
    text-decoration: none;
  }

  /* Responsive */
  @media(max-width: 460px) {
    .card { width: calc(100vw - 24px); padding: 36px 24px; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="scanlines"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="logo">
    <div class="logo-text">NEXUS</div>
    <div class="logo-sub">SECURE PORTAL</div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab-btn active" onclick="switchTab('signup')">SIGN UP</button>
    <button class="tab-btn" onclick="switchTab('signin')">SIGN IN</button>
  </div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <!-- ===== SIGNUP FLOW ===== -->
  <div id="signup-flow">
    <!-- Steps -->
    <div class="steps" id="steps">
      <div class="step-dot active" id="step1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="step2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="step3">3</div>
    </div>

    <!-- Phase 1: Phone -->
    <div class="phase active" id="phase1">
      <div class="form-group" style="animation-delay:0.4s">
        <label>MOBILE NUMBER</label>
        <div class="input-wrap">
          <span class="icon">📱</span>
          <span class="phone-prefix">+91</span>
          <input type="tel" name="phone" id="phone" maxlength="10" placeholder="XXXXXXXXXX" oninput="this.value=this.value.replace(/\D/g,'')">
          <div class="input-glow"></div>
        </div>
      </div>
      <button class="btn" onclick="sendOTP()" id="sendOtpBtn">
        <div class="btn-loader"></div>
        <span class="btn-text">SEND OTP →</span>
      </button>
    </div>

    <!-- Phase 2: OTP -->
    <div class="phase" id="phase2">
      <div class="form-group">
        <label style="text-align:center;display:block">ENTER OTP</label>
        <div class="otp-group">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNav(this,0)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNav(this,1)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNav(this,2)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNav(this,3)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNav(this,4)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNav(this,5)">
        </div>
      </div>
      <div class="timer" id="timer">RESEND IN <span id="timerVal">60</span>s
        <span class="resend-link" id="resendLink" onclick="resendOTP()">RESEND OTP</span>
      </div>
      <button class="btn" onclick="verifyOTP()" id="verifyBtn" style="margin-top:20px">
        <div class="btn-loader"></div>
        <span class="btn-text">VERIFY OTP →</span>
      </button>
      <button class="btn btn-ghost" onclick="goBack(1)"><span>← CHANGE NUMBER</span></button>
    </div>

    <!-- Phase 3: Create Password -->
    <div class="phase" id="phase3">
      <div class="form-group">
        <label>CREATE PASSWORD</label>
        <div class="input-wrap">
          <span class="icon">🔐</span>
          <input type="password" id="createPass" placeholder="MIN 8 CHARACTERS" oninput="checkStrength(this.value)">
          <span class="toggle-pass" onclick="togglePass('createPass', this)">👁</span>
          <div class="input-glow"></div>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" id="seg1"></div>
          <div class="strength-seg" id="seg2"></div>
          <div class="strength-seg" id="seg3"></div>
          <div class="strength-seg" id="seg4"></div>
        </div>
        <div class="strength-label" id="strengthLabel">ENTER PASSWORD</div>
      </div>
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <input type="password" id="confirmPass" placeholder="REPEAT PASSWORD">
          <span class="toggle-pass" onclick="togglePass('confirmPass', this)">👁</span>
          <div class="input-glow"></div>
        </div>
      </div>
      <button class="btn" onclick="createAccount()" id="createBtn">
        <div class="btn-loader"></div>
        <span class="btn-text">CREATE ACCOUNT ⚡</span>
      </button>
    </div>

    <!-- Phase 4: Success -->
    <div class="phase" id="phase4">
      <div class="success-screen">
        <div class="success-icon">
          <div class="success-ring"></div>
          <div class="success-check">✓</div>
        </div>
        <div class="success-title">ACCESS GRANTED</div>
        <div class="success-sub" style="margin-top:8px">ACCOUNT CREATED SUCCESSFULLY</div>
        <div class="success-sub" id="successPhone" style="margin-top:4px"></div>
        <button class="btn" onclick="switchTab('signin')" style="margin-top:28px">
          <span class="btn-text">PROCEED TO LOGIN →</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== SIGN IN FLOW ===== -->
  <div id="signin-flow" style="display:none">
    <div class="form-group" style="animation-delay:0.3s">
      <label>MOBILE NUMBER</label>
      <div class="input-wrap">
        <span class="icon">📱</span>
        <span class="phone-prefix">+91</span>
        <input type="tel" id="siPhone" maxlength="10" placeholder="XXXXXXXXXX" oninput="this.value=this.value.replace(/\D/g,'')">
        <div class="input-glow"></div>
      </div>
    </div>
    <div class="form-group" style="animation-delay:0.4s">
      <label>PASSWORD</label>
      <div class="input-wrap">
        <span class="icon">🔐</span>
        <input type="password" id="siPass" placeholder="YOUR PASSWORD">
        <span class="toggle-pass" onclick="togglePass('siPass', this)">👁</span>
        <div class="input-glow"></div>
      </div>
    </div>
    <button class="btn" onclick="signIn()" id="signinBtn">
      <div class="btn-loader"></div>
      <span class="btn-text">INITIATE ACCESS →</span>
    </button>
    <div class="note" style="margin-top:16px">
      <a onclick="switchTab('signup')">CREATE NEW ACCOUNT</a>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — paste your Fast2SMS API key here
// ============================================================
const FAST2SMS_API_KEY = 'YOUR_FAST2SMS_API_KEY_HERE';
// ============================================================

let currentPhone = '';
let sentOTP = '';
let timerInterval = null;
let currentPhase = 1;
let isSignup = true;

// Generate particles
(function() {
  const container = document.getElementById('particles');
  for(let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      animation-duration: ${4 + Math.random()*8}s;
      animation-delay: ${Math.random()*8}s;
      --drift: ${(Math.random()-0.5)*200}px;
      width: ${1+Math.random()*2}px;
      height: ${1+Math.random()*2}px;
      opacity: ${0.3+Math.random()*0.7};
    `;
    container.appendChild(p);
  }
})();

// Tab switch
function switchTab(tab) {
  isSignup = tab === 'signup';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && isSignup) || (i===1 && !isSignup));
  });
  document.getElementById('signup-flow').style.display = isSignup ? 'block' : 'none';
  document.getElementById('signin-flow').style.display = isSignup ? 'none' : 'block';
  document.getElementById('steps').style.display = isSignup ? 'flex' : 'none';
  clearAlert();

  if(isSignup) {
    goToPhase(1);
  } else {
    // animate signin in
    document.getElementById('signin-flow').style.animation = 'none';
    setTimeout(() => {
      document.getElementById('signin-flow').style.animation = 'phaseIn 0.5s ease both';
    }, 10);
  }
}

function showAlert(msg, type='error') {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert ${type}`;
  el.style.display = 'block';
}
function clearAlert() {
  document.getElementById('alert').style.display = 'none';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}

// ---- SEND OTP via Fast2SMS ----
async function sendOTP() {
  clearAlert();
  const phone = document.getElementById('phone').value.trim();
  if(!/^\d{10}$/.test(phone)) {
    showAlert('⚡ ENTER VALID 10-DIGIT MOBILE NUMBER');
    return;
  }
  currentPhone = phone;
  setLoading('sendOtpBtn', true);

  // Generate 6-digit OTP
  const otp = Math.floor(100000 + Math.random() * 900000).toString();
  sentOTP = otp;

  try {
    // ---- Fast2SMS API Call ----
    const response = await fetch(
      `https://www.fast2sms.com/dev/bulkV2?authorization=${FAST2SMS_API_KEY}&variables_values=${otp}&route=otp&numbers=${phone}`,
      { method: 'GET', headers: { 'Cache-Control': 'no-cache' } }
    );
    const data = await response.json();

    if(data.return === true) {
      goToPhase(2);
      startTimer();
      showAlert(`OTP SENT TO +91 ${phone}`, 'success');
    } else {
      // Demo mode: show OTP on screen for testing
      showAlert(`[DEMO] OTP: ${otp} (API key not set or error)`, 'success');
      goToPhase(2);
      startTimer();
    }
  } catch(e) {
    // If CORS or network error, show OTP for testing
    showAlert(`[DEMO MODE] OTP: ${otp}`, 'success');
    goToPhase(2);
    startTimer();
  }

  setLoading('sendOtpBtn', false);
}

// ---- OTP navigation ----
function otpNav(el, idx) {
  el.value = el.value.replace(/\D/g,'');
  const inputs = document.querySelectorAll('.otp-input');
  if(el.value && idx < 5) inputs[idx+1].focus();
  // handle backspace via keydown
}
document.addEventListener('keydown', e => {
  if(e.key === 'Backspace') {
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((inp, i) => {
      if(document.activeElement === inp && !inp.value && i > 0) {
        inputs[i-1].focus();
      }
    });
  }
});

// ---- Timer ----
function startTimer() {
  let seconds = 60;
  const valEl = document.getElementById('timerVal');
  const resendLink = document.getElementById('resendLink');
  const timerEl = document.getElementById('timer');
  resendLink.style.display = 'none';
  timerEl.innerHTML = `RESEND IN <span id="timerVal">${seconds}</span>s`;

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds--;
    const tv = document.getElementById('timerVal');
    if(tv) tv.textContent = seconds;
    if(seconds <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timer').innerHTML = `<span class="resend-link" id="resendLink" onclick="resendOTP()">↺ RESEND OTP</span>`;
    }
  }, 1000);
}

function resendOTP() {
  goToPhase(1);
  clearAlert();
}

// ---- Verify OTP ----
async function verifyOTP() {
  clearAlert();
  const inputs = document.querySelectorAll('.otp-input');
  const enteredOTP = Array.from(inputs).map(i => i.value).join('');
  if(enteredOTP.length < 6) {
    showAlert('⚡ ENTER COMPLETE 6-DIGIT OTP');
    return;
  }
  setLoading('verifyBtn', true);
  await delay(800);
  if(enteredOTP === sentOTP) {
    clearInterval(timerInterval);
    goToPhase(3);
    clearAlert();
  } else {
    showAlert('✕ INVALID OTP — TRY AGAIN');
    inputs.forEach(i => { i.value = ''; });
    inputs[0].focus();
    // shake animation
    document.querySelectorAll('.otp-input').forEach(inp => {
      inp.style.borderColor = 'var(--error)';
      setTimeout(() => inp.style.borderColor = '', 1000);
    });
  }
  setLoading('verifyBtn', false);
}

// ---- Password strength ----
function checkStrength(val) {
  const segs = [1,2,3,4].map(i => document.getElementById(`seg${i}`));
  const label = document.getElementById('strengthLabel');
  segs.forEach(s => s.className = 'strength-seg');

  if(!val) { label.textContent = 'ENTER PASSWORD'; return; }
  let score = 0;
  if(val.length >= 8) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/\d/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;

  const levels = ['WEAK','WEAK','MEDIUM','STRONG','STRONG'];
  const classes = ['','weak','weak','medium','strong'];
  label.textContent = levels[score];
  label.style.color = score <= 1 ? 'var(--error)' : score <= 2 ? '#ffaa00' : 'var(--neon)';
  for(let i = 0; i < score; i++) segs[i].classList.add(classes[score]);
}

// ---- Create account ----
async function createAccount() {
  clearAlert();
  const pass = document.getElementById('createPass').value;
  const confirm = document.getElementById('confirmPass').value;
  if(pass.length < 8) { showAlert('⚡ PASSWORD MUST BE AT LEAST 8 CHARACTERS'); return; }
  if(pass !== confirm) { showAlert('✕ PASSWORDS DO NOT MATCH'); return; }

  setLoading('createBtn', true);
  await delay(1200);

  // Save to localStorage (demo)
  const users = JSON.parse(localStorage.getItem('nexus_users') || '{}');
  users[currentPhone] = { password: pass, created: Date.now() };
  localStorage.setItem('nexus_users', JSON.stringify(users));

  setLoading('createBtn', false);
  document.getElementById('successPhone').textContent = `+91 ${currentPhone}`;
  goToPhase(4);
  document.getElementById('steps').style.display = 'none';
}

// ---- Sign in ----
async function signIn() {
  clearAlert();
  const phone = document.getElementById('siPhone').value.trim();
  const pass = document.getElementById('siPass').value;

  if(!/^\d{10}$/.test(phone)) { showAlert('⚡ ENTER VALID MOBILE NUMBER'); return; }
  if(!pass) { showAlert('⚡ ENTER YOUR PASSWORD'); return; }

  setLoading('signinBtn', true);
  await delay(1000);

  const users = JSON.parse(localStorage.getItem('nexus_users') || '{}');
  if(users[phone] && users[phone].password === pass) {
    showAlert(`✓ WELCOME BACK! ACCESS GRANTED FOR +91 ${phone}`, 'success');
  } else {
    showAlert('✕ INVALID CREDENTIALS — ACCESS DENIED');
  }
  setLoading('signinBtn', false);
}

// ---- Toggle password visibility ----
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// ---- Phase navigation ----
function goToPhase(n) {
  for(let i = 1; i <= 4; i++) {
    const p = document.getElementById(`phase${i}`);
    p.classList.toggle('active', i === n);
  }
  currentPhase = n;
  updateSteps(n);
}

function updateSteps(n) {
  for(let i = 1; i <= 3; i++) {
    const dot = document.getElementById(`step${i}`);
    dot.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  if(document.getElementById('line1')) {
    document.getElementById('line1').className = 'step-line' + (n > 1 ? ' active' : '');
    document.getElementById('line2').className = 'step-line' + (n > 2 ? ' active' : '');
  }
}

function goBack(toPhase) {
  clearAlert();
  goToPhase(toPhase);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
